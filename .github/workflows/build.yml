name: Build EasyClipper

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:  # Позволяет запускать вручную

jobs:
  build:
    runs-on: windows-latest

    env:
      PROJECT_PATH: EasyClipper.csproj  # ← Укажите правильный путь
      PUBLISH_DIR: EasyClipper/publish

    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4

    - name: 🛠 Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: 📦 Restore dependencies
      run: dotnet restore $env:PROJECT_PATH

    - name: 🔨 Build
      run: dotnet build $env:PROJECT_PATH -c Release --no-restore

    # Опционально: публикация как self-contained (больше размер, но не требует .NET на машине пользователя)
    # - name: 🚀 Publish (self-contained)
    #   run: |
    #     dotnet publish $env:PROJECT_PATH -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:EnableCompressionInSingleFile=true -o $env:PUBLISH_DIR

    # публикацияframework-dependent (меньше размер, но требует .NET 8 Runtime)
    - name: 🚀 Publish (framework-dependent)
      run: |
        dotnet publish $env:PROJECT_PATH -c Release -o $env:PUBLISH_DIR

    - name: 📤 Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: EasyClipper-${{ github.sha }}
        path: ${{ env.PUBLISH_DIR }}
        retention-days: 7
